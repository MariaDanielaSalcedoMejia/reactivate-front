<div class="health-hero">
  <h1>Blog Fitness</h1>
  <p>Comparte tus experiencias y motiva a otros 💬</p>
</div>

<!-- 📝 CREAR POST -->
<div class="post-box">

  <textarea
    [(ngModel)]="mensaje"
    placeholder="¿Qué hiciste hoy? ¿Cómo te sentiste?"
  ></textarea>

  <div class="actions">
    <button (click)="publicar()">Publicar</button>
  </div>

  <div class="error" *ngIf="error">{{ error }}</div>
</div>

<!-- 📰 FEED -->
<div class="feed">

  <div class="post-card" *ngFor="let post of posts">

    <div class="post-header">
      <div class="avatar">👤</div>
      <div>
        <strong>{{ post.author_id ? 'Usuario registrado' : 'Invitado' }}</strong>
        <small>{{ post.created_at | date:'short' }}</small>
      </div>
    </div>

    <h3>{{ post.title }}</h3>
    <p class="post-text">{{ post.content }}</p>

  </div>

</div>
